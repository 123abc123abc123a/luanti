name: iOS Device Build (.ipa)

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - '.github/workflows/ios.yml'

jobs:
  build-ios-device:
    runs-on: macos-15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti
          ref: refs/pull/15451/head

      - name: Install dependencies
        run: |
          # Patch scripts to ensure they use iPhoneOS paths
          sed -i '' 's/iphonesimulator/iphoneos/g' util/ci/common.sh
          sed -i '' 's/iPhoneSimulator/iPhoneOS/g' util/ci/common.sh
          source ./util/ci/common.sh
          install_ios_deps 18.2

      - name: Build for iPhone Hardware
        run: |
          mkdir build
          cd build
          
          # 1. Define paths and environment
          export DEVELOPER_DIR=/Applications/Xcode_16.2.app/Contents/Developer
          export DEPS_DIR=/Users/Shared/ios18.2_deps/iPhoneOS
          
          # 2. Configure CMake with explicit dependency paths
          cmake .. -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_PREFIX_PATH=$DEPS_DIR \
            -DJPEG_LIBRARY=$DEPS_DIR/lib/libjpeg.a \
            -DJPEG_INCLUDE_DIR=$DEPS_DIR/include \
            -DZSTD_LIBRARY=$DEPS_DIR/lib/libzstd.a \
            -DZSTD_INCLUDE_DIR=$DEPS_DIR/include
          
          # 3. Force Manual Signing in the generated project
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' luanti.xcodeproj/project.pbxproj
          
          # 4. Build with explicit signing overrides
          xcodebuild -project luanti.xcodeproj -target luanti -configuration Release -sdk iphoneos \
            DEVELOPER_DIR=$DEVELOPER_DIR \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates

      - name: Package .ipa
        run: |
          mkdir -p ipa_release/Payload
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          cp -R "$APP_PATH" ipa_release/Payload/
          cd ipa_release
          zip -r ../Luanti_Device_Unsigned.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luanti-iOS-Device-Build
          path: Luanti_Device_Unsigned.ipa
          retention-days: 5
