name: iOS Device Build (.ipa)

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - '.github/workflows/ios.yml'

jobs:
  build-ios-device:
    strategy:
      matrix:
        osver: [18.2]
        xcodever: [16.2]
    runs-on: macos-15
    steps:
      - name: Checkout iOS PR Source Code
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti
          ref: refs/pull/15451/head

      - name: Prepare environment
        run: |
          echo "REPDIR=$(pwd)" >> $GITHUB_ENV
          echo "osver=${{matrix.osver}}" >> $GITHUB_ENV
          echo "xcodever=${{matrix.xcodever}}" >> $GITHUB_ENV

      - name: Install deps
        run: |
          # Patch scripts to force iPhoneOS dependency compilation
          sed -i '' 's/iphonesimulator/iphoneos/g' util/ci/common.sh
          sed -i '' 's/iPhoneSimulator/iPhoneOS/g' util/ci/common.sh
          sed -i '' 's/iphonesimulator/iphoneos/g' util/ci/build_ios.sh
          sed -i '' 's/iPhoneSimulator/iPhoneOS/g' util/ci/build_ios.sh
          
          source ./util/ci/common.sh
          install_ios_deps $osver

      - name: Build for iPhone Hardware
        run: |
          mkdir build
          cd build
          
          # Point to the freshly compiled hardware dependencies
          export DEPS_DIR=/Users/Shared/ios${osver}_deps/iPhoneOS
          export SDK=iphoneos
          export PLATFORM=OS
          
          # Execute build with explicit signing overrides to prevent "Development Team" error
          ../util/ci/build_ios.sh \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates

      - name: Package Application Bundle into .ipa
        run: |
          mkdir -p ipa_release/Payload
          
          # Find the generated app bundle
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find compiled .app bundle!"
            exit 1
          fi
          
          cp -R "$APP_PATH" ipa_release/Payload/
          cd ipa_release
          zip -r ../Luanti_Device_Unsigned.ipa Payload/
          cd ..
          
          echo "Successfully packaged Luanti_Device_Unsigned.ipa"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luanti-iOS-Device-Build
          path: Luanti_Device_Unsigned.ipa
          retention-days: 5
