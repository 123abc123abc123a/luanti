name: iOS Sideload Build (.ipa for e-Sign/SideStore)

on:
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
  XCODE_VER: "16.2"
  ARCH: iPhoneOS
  DEPS_WORK: /Users/runner/ios_deps_work
  INSTALL_DIR: /Users/runner/ios_install/iPhoneOS
  # IOS_OSVER is no longer hard-coded. It is resolved at runtime from the
  # iOS SDK actually installed on the runner (see "Resolve installed iOS SDK").

jobs:
  build-ios-device:
    runs-on: macos-15
    timeout-minutes: 300
    steps:
      - name: Checkout Luanti (iOS PR)
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti
          ref: refs/pull/15451/head
          path: luanti

      - name: Checkout iOS deps scripts
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti_ios_deps
          path: ios_deps

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          echo "mac SDK: $(xcrun --sdk macosx --show-sdk-version)"
          echo "ios SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Resolve installed iOS SDK version
        run: |
          IOS_SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "Detected iOS SDK: $IOS_SDK_VER"
          # angle.sh forces ios_sdk_version = "$osver"; make $osver match the
          # SDK that is actually present so it never hunts for a missing
          # version-named iPhoneOS<X>.sdk.
          echo "IOS_OSVER=$IOS_SDK_VER" >> "$GITHUB_ENV"

      - name: Verify iOS SDK path is real (not a dangling symlink)
        run: |
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          echo "Active iphoneos SDK path: $SDK_PATH"
          ls -ld "$SDK_PATH"
          PLAT_SDKS="$(dirname "$SDK_PATH")"
          echo "=== Available iOS SDKs ==="
          ls -l "$PLAT_SDKS"
          # Confirm the version-named SDK ANGLE will look for exists & resolves.
          VER_SDK="$PLAT_SDKS/iPhoneOS${IOS_OSVER}.sdk"
          if [ -e "$VER_SDK" ]; then
            echo "OK: $VER_SDK resolves to -> $(readlink -f "$VER_SDK")"
          else
            echo "::error::Expected $VER_SDK does not exist. IOS_OSVER ($IOS_OSVER) does not match the installed SDK."
            exit 1
          fi

      - name: Install host build tools (required by deps.sh)
        run: |
          brew install nasm m4 autoconf automake libtool

      # NOTE on args.gn:
      #   The previous failure ("Requested target sysroot SDK does not found
      #   iPhoneOS18.2.sdk") was caused by pinning SDK versions in args.gn.
      #   angle.sh ALREADY rewrites ios_sdk_version itself, and Chromium's
      #   sysroot resolver derives the mac/ios SDK from the active Xcode via
      #   xcrun. Pinning versions here breaks that resolution, so we strip all
      #   SDK version pins and let GN auto-detect.
      #   Do NOT add use_system_xcode / ios_use_xcode_symlinks: those are not
      #   valid ANGLE GN args and will break `gn gen`.
      - name: Sanitize ANGLE GN args (let GN auto-detect SDKs)
        run: |
          cd ios_deps
          GNFILE=data/args.gn

          echo "=== Original data/args.gn ==="
          cat "$GNFILE"

          sed -i.bak \
            -e '/^mac_sdk_min[[:space:]]*=/d' \
            -e '/^mac_sdk_version[[:space:]]*=/d' \
            -e '/^ios_sdk_version[[:space:]]*=/d' \
            "$GNFILE"
          rm -f "$GNFILE.bak"

          echo "=== Sanitized data/args.gn ==="
          cat "$GNFILE"

      # --- Caching to avoid the very slow ANGLE download/sync on retries ---
      # Cache keys bumped to v5: the previous run cached a poisoned/partial
      # work tree (failed in `gn gen`) and a broken args.gn. Do not restore it.
      - name: Cache ANGLE / deps work dir
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_WORK }}
          key: ios-deps-work-${{ env.ARCH }}-${{ env.IOS_OSVER }}-v5

      - name: Cache iOS deps install
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.INSTALL_DIR }}
          key: ios-deps-install-${{ env.ARCH }}-${{ env.IOS_OSVER }}-v5

      - name: Build iOS dependencies (incl. ANGLE)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p "$DEPS_WORK" "$INSTALL_DIR"
          cd ios_deps
          chmod +x build.sh deps.sh angle.sh || true

          # build.sh <where_deps> <where_install> <arch> <osver> <step>
          # build.sh calls build_ios_angle with an EMPTY xcodever, so it will
          # NOT re-run xcode-select; we already selected Xcode 16.2 above.
          # angle.sh clones depot_tools itself, so we don't pre-clone it.
          ./build.sh "$DEPS_WORK" "$INSTALL_DIR" "$ARCH" "$IOS_OSVER" all

      - name: Inspect installed deps
        run: |
          echo "=== Install tree (top) ==="
          ls -R "$INSTALL_DIR" | head -n 300

          echo "=== ANGLE static libs? ==="
          missing=0
          for lib in libANGLE_static.a libEGL_static.a libGLESv2_static.a; do
            if find "$INSTALL_DIR" -name "$lib" | grep -q .; then
              echo "FOUND: $lib"
            else
              echo "MISSING: $lib"
              missing=1
            fi
          done

          echo "=== EGL headers (under ANGLE)? ==="
          if find "$INSTALL_DIR" -path "*ANGLE*" -name "egl.h" | grep -q .; then
            find "$INSTALL_DIR" -path "*ANGLE*" -name "egl.h"
          else
            echo "egl.h NOT FOUND"
            missing=1
          fi

          echo "=== SDL2 config ==="
          find "$INSTALL_DIR" \( -iname 'SDL2Config.cmake' -o -iname 'sdl2-config.cmake' \) || true
          echo "=== Freetype ==="
          find "$INSTALL_DIR" -name 'libfreetype*' || true

          if [ "$missing" = "1" ]; then
            echo "::error::Required ANGLE artifacts are missing from the install tree."
            exit 1
          fi

      - name: Configure (CMake)
        run: |
          cd luanti
          mkdir build && cd build
          DEPS="$INSTALL_DIR"

          SDL2_CFG=$(find "$DEPS" \( -iname 'SDL2Config.cmake' -o -iname 'sdl2-config.cmake' \) -print -quit)
          if [ -z "$SDL2_CFG" ]; then
            echo "::error::Could not locate SDL2 CMake config under $DEPS"
            exit 1
          fi
          SDL2_CFG_DIR=$(dirname "$SDL2_CFG")
          echo "SDL2_DIR -> $SDL2_CFG_DIR"

          cmake .. -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="$DEPS" \
            -DCMAKE_FIND_ROOT_PATH="$DEPS" \
            -DSDL2_DIR="$SDL2_CFG_DIR" \
            -DBUILD_UNITTESTS=0 \
            -DBUILD_BENCHMARKS=0

      - name: Build for iPhone Hardware (unsigned)
        run: |
          cd luanti/build
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' \
            luanti.xcodeproj/project.pbxproj
          xcodebuild -project luanti.xcodeproj -list

          set -o pipefail
          BUILD_FAILED=0
          xcodebuild \
            -project luanti.xcodeproj -target luanti -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee xcodebuild_full.log || BUILD_FAILED=1

          echo "================ ERROR SUMMARY ================"
          # Anchor on real diagnostics; avoid matching "0 errors" / paths with "error".
          grep -n -E "(^| )(error:|fatal error:)|Undefined symbols|symbol\(s\) not found|^ld: |clang: error:" \
            xcodebuild_full.log | head -n 60 || echo "No explicit error lines matched."
          echo "================ LAST 60 LINES ================"
          tail -n 60 xcodebuild_full.log

          if [ "$BUILD_FAILED" = "1" ]; then
            exit 65
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: luanti/build/xcodebuild_full.log
          retention-days: 5

      - name: Package sideload-ready .ipa
        run: |
          set -e
          cd luanti
          APP_PATH=$(find build -type d -name "*.app" ! -name "*.dSYM" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found."
            find build -name "*.app*" -maxdepth 6 || true
            exit 1
          fi
          echo "App: $APP_PATH"

          rm -rf "$APP_PATH/_CodeSignature" || true
          rm -f  "$APP_PATH/embedded.mobileprovision" || true

          PLIST="$APP_PATH/Info.plist"
          echo "=== Info.plist essentials ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "no CFBundleIdentifier"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST" 2>/dev/null || echo "no CFBundleExecutable"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion"   "$PLIST" 2>/dev/null || echo "no MinimumOSVersion"

          BIN_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST" 2>/dev/null || echo "luanti")
          echo "=== Binary architecture (must be arm64) ==="
          file "$APP_PATH/$BIN_NAME" || true
          lipo -info "$APP_PATH/$BIN_NAME" 2>/dev/null || true

          mkdir -p ipa_release/Payload
          cp -R "$APP_PATH" ipa_release/Payload/
          cd ipa_release
          # Write the .ipa to an absolute path so the upload step is unambiguous.
          zip -r "$GITHUB_WORKSPACE/Luanti_Sideload.ipa" Payload/ -x "*.DS_Store"
          unzip -l "$GITHUB_WORKSPACE/Luanti_Sideload.ipa" | head -n 40

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luanti-iOS-Sideload
          path: Luanti_Sideload.ipa
          retention-days: 5
