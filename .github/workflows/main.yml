name: iOS Sideload Build (.ipa)

on:
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
  IOS_OSVER: "18.2"
  ARCH: iPhoneOS
  # Where the official deps scripts install the built libraries:
  INSTALL_DIR: /Users/runner/ios_install/iPhoneOS

jobs:
  build-ios-device:
    runs-on: macos-15
    steps:
      - name: Checkout Luanti (iOS PR)
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti
          ref: refs/pull/15451/head
          path: luanti

      - name: Checkout iOS deps scripts
        uses: actions/checkout@v4
        with:
          repository: luanti-org/luanti_ios_deps
          path: ios_deps

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version

      # ANGLE + all deps take a long time; cache the install output.
      - name: Cache iOS deps install
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.INSTALL_DIR }}
          # Bump the version suffix to force a rebuild when scripts change.
          key: ios-deps-${{ env.ARCH }}-${{ env.IOS_OSVER }}-v1

      - name: Build iOS dependencies (incl. ANGLE)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          # depot_tools is needed by ANGLE's build (gclient/gn/ninja).
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          export PATH="$HOME/depot_tools:$PATH"

          mkdir -p "$HOME/ios_deps_work" "$INSTALL_DIR"
          cd ios_deps
          chmod +x build.sh deps.sh angle.sh || true

          # build.sh <where_deps> <where_install> <arch> <osver> <step>
          ./build.sh "$HOME/ios_deps_work" "$INSTALL_DIR" "$ARCH" "$IOS_OSVER" all

      - name: Inspect installed deps
        run: |
          echo "=== Install tree ==="
          ls -R "$INSTALL_DIR" | head -n 300
          echo "=== EGL header present? ==="
          find "$INSTALL_DIR" -name "egl.h" -path "*EGL*" || echo "EGL/egl.h NOT FOUND"
          echo "=== SDL2 config ==="
          find "$INSTALL_DIR" \( -iname 'SDL2Config.cmake' -o -iname 'sdl2-config.cmake' \) || true

      - name: Configure (CMake)
        run: |
          cd luanti
          mkdir build && cd build

          DEPS="$INSTALL_DIR"
          SDL2_CFG_DIR=$(dirname "$(find "$DEPS" \( -iname 'SDL2Config.cmake' -o -iname 'sdl2-config.cmake' \) -print -quit)")

          cmake .. -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="$DEPS" \
            -DCMAKE_FIND_ROOT_PATH="$DEPS" \
            -DSDL2_DIR="$SDL2_CFG_DIR"

      - name: Build for iPhone Hardware (unsigned)
        run: |
          cd luanti/build
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle =
